<html>

<body style="background-color: black">

<table style="width:600; border-spacing: 30px;">
    <tr valign='top'>
      <td align='center' style="color: gold; font-family:Helvetica; font-size: 20px;">
        Select a date
        <p>
        <button style="background-color: gold; padding: 15px 32px; border-radius: 45%;text-align: center;" onclick="showToday()">Today</button>
        <p>
        <div class="date-picker">
          <input style="background-color: gold;" type="date" id='datePick' name="check-date" min="2022-01-02" max="2025-12-31" required>
        </div>
      </td>
      <td align='center' style="color: gold; font-family:Helvetica; font-size: 19px;">
        <div id='showDate'></div>
        <div id='showPic'></div>
      </td>
    </tr>
  </table>

  <script>

    // Show shirt color for today as default
    showToday();

    // Change event handler for the date picker
    const selectElement = document.querySelector('.date-picker');
    selectElement.addEventListener('change', (event) => {
      const result = document.querySelector('.result');
      let dateStr = event.target.value;
      //  Convert from 'yyyy-mm-dd' format and show shirt for selected date
      let selectedDate = new Date(dateStr.replace('-', ','));
      showDate(selectedDate);
    });

    // Handle click event on "Today" button to show today's shirt color
    function showToday() {
      // Reset date picker so change event works
      let dateControl = document.querySelector('input[type="date"]');
      dateControl.value = '';
      // Show today's shirt
      let currentDate = new Date();
      showDate(currentDate);
    }

    // Show the shirt color for the given date
    function showDate(colorDate) {
      // Calc number of days from epoch to given date
      let currentDays = Math.floor(colorDate / (24 * 60 * 60 * 1000));
      // Calc number of days from new epoch (1/2/2022)
      let epochDate2022 = new Date('January 2, 2022 00:00:00');
      let epochDays2022 = Math.floor(epochDate2022 / (24 * 60 * 60 * 1000));
      // Determine shirt color for given date.  Epoch date is first day of 7 days of "gold" shirt.
      // Shirt colors change every 7 days in following 4 rotation sequence: 'gold', 'white', 'black', 'blue'
      let week4s = (currentDays - epochDays2022) % 28;
      let weekIndex = Math.floor(week4s / 7);
      // Display the given date
      document.getElementById("showDate").innerHTML=eval('colorDate.toDateString()');

      // Show the shirt color icon
      if (weekIndex == 0) {
        goldShirt()
      };
      if (weekIndex == 1) {
        whiteShirt()
      };
      if (weekIndex == 2) {
        blackShirt()
      };
      if (weekIndex == 3) {
        blueShirt()
      };

    }
